<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SEC 10-K Analyst</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: #f5f5f5;
      color: #111;
    }

    header {
      padding: 16px 24px;
      background: white;
      border-bottom: 1px solid #e0e0e0;
      font-size: 16px;
      font-weight: 600;
    }

    .main { display: flex; flex: 1; overflow: hidden; }

    .sidebar {
      width: 260px;
      background: white;
      border-right: 1px solid #e0e0e0;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      overflow-y: auto;
      flex-shrink: 0;
    }

    .sidebar h2 { font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; }

    input[type="text"], input[type="url"] {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 13px;
      outline: none;
    }
    input:focus { border-color: #555; }

    button {
      padding: 8px 12px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      background: #111;
      color: white;
      width: 100%;
    }
    button:hover { background: #333; }
    button:disabled { background: #999; cursor: not-allowed; }

    .msg { font-size: 12px; margin-top: 4px; }
    .msg.ok  { color: #2a7a2a; }
    .msg.err { color: #cc0000; }
    .msg.info { color: #888; }

    .doc-list { display: flex; flex-direction: column; gap: 6px; }
    .doc-item { font-size: 12px; padding: 8px 10px; background: #f9f9f9; border-radius: 6px; border: 1px solid #e8e8e8; }
    .doc-item .name { font-weight: 600; }
    .doc-item .meta { color: #888; margin-top: 2px; }

    .chat-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .empty {
      color: #bbb;
      font-size: 14px;
      text-align: center;
      margin-top: 80px;
    }

    .message { display: flex; flex-direction: column; max-width: 75%; }
    .message.user      { align-self: flex-end; align-items: flex-end; }
    .message.assistant { align-self: flex-start; }

    .bubble {
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.6;
    }
    .message.user      .bubble { background: #111; color: white; border-bottom-right-radius: 3px; }
    .message.assistant .bubble { background: white; border: 1px solid #e0e0e0; border-bottom-left-radius: 3px; }

    .sources-toggle {
      font-size: 12px;
      color: #888;
      background: none;
      border: none;
      padding: 4px 0 0 0;
      cursor: pointer;
      width: auto;
      text-align: left;
      font-weight: normal;
    }
    .sources-toggle:hover { color: #333; background: none; }

    .sources-list { display: none; flex-direction: column; gap: 5px; margin-top: 5px; }
    .sources-list.open { display: flex; }

    .source-item { background: #f9f9f9; border: 1px solid #e8e8e8; border-radius: 6px; padding: 7px 10px; font-size: 12px; }
    .source-meta { font-weight: 600; color: #555; margin-bottom: 3px; }
    .source-excerpt { color: #777; line-height: 1.5; }

    .input-row {
      padding: 14px 20px;
      background: white;
      border-top: 1px solid #e0e0e0;
      display: flex;
      gap: 8px;
    }
    .input-row input { flex: 1; margin: 0; }
    .input-row button { width: auto; padding: 8px 18px; }

    .spinner {
      display: inline-block;
      width: 12px; height: 12px;
      border: 2px solid currentColor;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 4px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<header>SEC 10-K Analyst</header>

<div class="main">
  <div class="sidebar">
    <div>
      <h2 style="margin-bottom: 10px;">Add Filing</h2>
      <input type="url"  id="ingest-url"     placeholder="SEC EDGAR URL" style="margin-bottom: 6px;" />
      <input type="text" id="ingest-company" placeholder="Company name"  style="margin-bottom: 6px;" />
      <button id="ingest-btn" onclick="ingestDoc()">Ingest</button>
      <div id="ingest-status"></div>
    </div>

    <div>
      <h2 style="margin-bottom: 10px;">Documents</h2>
      <div class="doc-list" id="doc-list">
        <div style="font-size:12px;color:#bbb;">None yet.</div>
      </div>
    </div>
  </div>

  <div class="chat-area">
    <div class="messages" id="messages">
      <div class="empty" id="empty">Add a filing on the left, then ask a question below.</div>
    </div>
    <div class="input-row">
      <input type="text" id="question-input" placeholder="Ask a question…"
             onkeydown="if(event.key==='Enter') askQuestion()" />
      <button id="ask-btn" onclick="askQuestion()">Send</button>
    </div>
  </div>
</div>

<script>
  window.onload = loadDocs;

  async function loadDocs() {
    try {
      const res  = await fetch('/documents');
      const data = await res.json();
      renderDocs(data.documents || []);
    } catch (_) {}
  }

  function renderDocs(docs) {
    const list = document.getElementById('doc-list');
    if (!docs.length) {
      list.innerHTML = '<div style="font-size:12px;color:#bbb;">None yet.</div>';
      return;
    }
    list.innerHTML = docs.map(d => `
      <div class="doc-item">
        <div class="name">${d.company}</div>
        <div class="meta">${d.chunk_count} chunks · ${d.sections_found.join(', ')}</div>
      </div>
    `).join('');
  }

  async function ingestDoc() {
    const url     = document.getElementById('ingest-url').value.trim();
    const company = document.getElementById('ingest-company').value.trim();
    const statusEl = document.getElementById('ingest-status');
    const btn      = document.getElementById('ingest-btn');

    if (!url || !company) {
      statusEl.innerHTML = '<div class="msg err">Fill in both fields.</div>';
      return;
    }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Ingesting…';
    statusEl.innerHTML = '<div class="msg info">Downloading (~15s)…</div>';

    try {
      const res  = await fetch('/documents/ingest', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url, company_name: company }),
      });
      const data = await res.json();

      if (!res.ok) {
        statusEl.innerHTML = `<div class="msg err">${data.detail}</div>`;
      } else {
        statusEl.innerHTML = `<div class="msg ok">✓ Done — ${data.chunk_count} chunks</div>`;
        document.getElementById('ingest-url').value     = '';
        document.getElementById('ingest-company').value = '';
        loadDocs();
      }
    } catch (e) {
      statusEl.innerHTML = `<div class="msg err">Error: ${e.message}</div>`;
    }

    btn.disabled = false;
    btn.innerHTML = 'Ingest';
  }

  async function askQuestion() {
    const input    = document.getElementById('question-input');
    const btn      = document.getElementById('ask-btn');
    const question = input.value.trim();
    if (!question) return;

    input.value    = '';
    input.disabled = true;
    btn.disabled   = true;

    document.getElementById('empty')?.remove();
    appendMessage('user', question);
    const thinkingId = appendThinking();

    try {
      const res  = await fetch('/questions/ask', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question, top_k: 5 }),
      });
      const data = await res.json();
      removeEl(thinkingId);

      if (!res.ok) {
        appendMessage('assistant', `Error: ${data.detail}`);
      } else if (data.error && !data.answer) {
        appendMessage('assistant', data.error);
      } else {
        appendMessage('assistant', data.answer, data.sources || []);
      }
    } catch (e) {
      removeEl(thinkingId);
      appendMessage('assistant', `Network error: ${e.message}`);
    }

    input.disabled = false;
    btn.disabled   = false;
    input.focus();
  }

  function appendMessage(role, text, sources = []) {
    const messages = document.getElementById('messages');
    const div      = document.createElement('div');
    div.className  = `message ${role}`;

    let sourcesHtml = '';
    if (sources.length) {
      const id = 'src-' + Date.now();
      sourcesHtml = `
        <button class="sources-toggle" onclick="toggleSources('${id}')">
          ${sources.length} source${sources.length > 1 ? 's' : ''} — show
        </button>
        <div class="sources-list" id="${id}">
          ${sources.map(s => `
            <div class="source-item">
              <div class="source-meta">[${s.source_index}] ${s.company} · ${s.section}</div>
              <div class="source-excerpt">${s.excerpt}</div>
            </div>`).join('')}
        </div>`;
    }

    div.innerHTML = `<div class="bubble">${esc(text)}</div>${sourcesHtml}`;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
  }

  function appendThinking() {
    const id  = 'thinking-' + Date.now();
    const div = document.createElement('div');
    div.className = 'message assistant';
    div.id        = id;
    div.innerHTML = '<div class="bubble" style="color:#aaa"><span class="spinner"></span>Thinking…</div>';
    document.getElementById('messages').appendChild(div);
    document.getElementById('messages').scrollTop = 99999;
    return id;
  }

  function removeEl(id) { document.getElementById(id)?.remove(); }

  function toggleSources(id) {
    const el  = document.getElementById(id);
    const btn = el.previousElementSibling;
    el.classList.toggle('open');
    const n = el.children.length;
    btn.textContent = el.classList.contains('open')
      ? `${n} source${n > 1 ? 's' : ''} — hide`
      : `${n} source${n > 1 ? 's' : ''} — show`;
  }

  function esc(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
  }
</script>
</body>
</html>
